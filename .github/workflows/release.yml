name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            goos: linux
            goarch: amd64
            artifact: chrome-mcp-linux-amd64
          - platform: linux/arm64
            goos: linux
            goarch: arm64
            artifact: chrome-mcp-linux-arm64
          - platform: darwin/amd64
            goos: darwin
            goarch: amd64
            artifact: chrome-mcp-darwin-amd64
          - platform: darwin/arm64
            goos: darwin
            goarch: arm64
            artifact: chrome-mcp-darwin-arm64
          - platform: windows/amd64
            goos: windows
            goarch: amd64
            artifact: chrome-mcp-windows-amd64.exe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }} -X main.commit=$(git rev-parse --short HEAD) -X main.date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          go build -ldflags="$ldflags" -o ${{ matrix.artifact }} ./cmd/chrome-mcp/

      - name: Package server
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip ${{ matrix.artifact }}.zip ${{ matrix.artifact }}
          else
            tar -czvf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          fi

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.tar.gz
          retention-days: 5

  build-extension:
    name: Build Chrome Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update manifest version
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cd extension
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" manifest.json

      - name: Package extension
        run: |
          cd extension
          zip -r ../chrome-mcp-extension.zip manifest.json background.js content.js popup.js popup.html popup.css styles.css icon.png

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-mcp-extension
          path: chrome-mcp-extension.zip
          retention-days: 5

  create-release:
    name: Create Release
    needs: [release, build-extension]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download server artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: chrome-mcp-*
          merge-multiple: true

      - name: Download extension artifact
        uses: actions/download-artifact@v4
        with:
          name: chrome-mcp-extension
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "$TAG_NAME" | head -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline -20 | sed 's/^[^-]*- /- /')
          else
            CHANGELOG=$(git log --oneline $PREV_TAG..HEAD | sed 's/^[^-]*- /- /')
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "## What's Changed" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...$TAG_NAME" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          name: Chrome MCP ${{ github.ref }}
          body_path: ${{ github.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            artifacts/chrome-mcp-*
            artifacts/chrome-mcp-extension.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
