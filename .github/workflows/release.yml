name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Linux amd64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }} -X main.commit=$(git rev-parse --short HEAD) -X main.date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          go build -ldflags="$ldflags" -o chrome-mcp-linux-amd64 ./cmd/chrome-mcp/
          tar -czvf chrome-mcp-linux-amd64.tar.gz chrome-mcp-linux-amd64

      - name: Build Linux arm64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }} -X main.commit=$(git rev-parse --short HEAD) -X main.date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          go build -ldflags="$ldflags" -o chrome-mcp-linux-arm64 ./cmd/chrome-mcp/
          tar -czvf chrome-mcp-linux-arm64.tar.gz chrome-mcp-linux-arm64

      - name: Build Darwin amd64
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }} -X main.commit=$(git rev-parse --short HEAD) -X main.date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          go build -ldflags="$ldflags" -o chrome-mcp-darwin-amd64 ./cmd/chrome-mcp/
          tar -czvf chrome-mcp-darwin-amd64.tar.gz chrome-mcp-darwin-amd64

      - name: Build Darwin arm64
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }} -X main.commit=$(git rev-parse --short HEAD) -X main.date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          go build -ldflags="$ldflags" -o chrome-mcp-darwin-arm64 ./cmd/chrome-mcp/
          tar -czvf chrome-mcp-darwin-arm64.tar.gz chrome-mcp-darwin-arm64

      - name: Build Windows amd64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }} -X main.commit=$(git rev-parse --short HEAD) -X main.date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          go build -ldflags="$ldflags" -o chrome-mcp-windows-amd64.exe ./cmd/chrome-mcp/
          zip chrome-mcp-windows-amd64.zip chrome-mcp-windows-amd64.exe

      - name: Update manifest version
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cd extension
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" manifest.json

      - name: Package extension
        run: |
          cd extension
          zip -r ../chrome-mcp-extension.zip manifest.json background.js content.js popup.js popup.html popup.css styles.css icon.png

      - name: Generate changelog
        id: changelog
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "$TAG_NAME" | head -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline -20 | sed 's/^[^-]*- /- /')
          else
            CHANGELOG=$(git log --oneline $PREV_TAG..HEAD | sed 's/^[^-]*- /- /')
          fi
          CHANGELOG="${CHANGELOG:-No changes}"
          EOF_MARKER="EOF_CHANGELOG"
          {
            echo "## What's Changed"
            echo ""
            echo "$CHANGELOG"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...$TAG_NAME"
          } > changelog.md
          echo "body_path=changelog.md" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          name: Chrome MCP ${{ github.ref }}
          body_path: ${{ steps.changelog.outputs.body_path }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            chrome-mcp-linux-amd64.tar.gz
            chrome-mcp-linux-arm64.tar.gz
            chrome-mcp-darwin-amd64.tar.gz
            chrome-mcp-darwin-arm64.tar.gz
            chrome-mcp-windows-amd64.zip
            chrome-mcp-extension.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
