<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 320px;
      min-height: 200px;
      background: #1a1a2e;
      color: #eee;
    }
    
    .header {
      background: #16213e;
      padding: 12px 16px;
      border-bottom: 1px solid #0f3460;
    }
    
    .header h1 {
      font-size: 16px;
      color: #00d4ff;
      margin-bottom: 4px;
    }
    
    .header .subtitle {
      font-size: 11px;
      color: #888;
    }
    
    .server-status {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }
    
    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
    }
    
    .status-indicator.running {
      background: #4CAF50;
      box-shadow: 0 0 6px #4CAF50;
    }
    
    .status-indicator.stopped {
      background: #f44336;
    }
    
    .status-text {
      flex: 1;
      font-size: 12px;
    }
    
    .server-btn {
      padding: 4px 12px;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .server-btn.start {
      background: #4CAF50;
      color: white;
    }
    
    .server-btn.stop {
      background: #f44336;
      color: white;
    }
    
    .tabs-section {
      padding: 12px 16px;
    }
    
    .section-title {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .filter-inputs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    
    .filter-input {
      flex: 1;
      padding: 6px 10px;
      background: #0f3460;
      border: 1px solid #16213e;
      border-radius: 4px;
      color: #eee;
      font-size: 11px;
    }
    
    .filter-input::placeholder {
      color: #666;
    }
    
    .filter-input:focus {
      outline: none;
      border-color: #00d4ff;
    }
    
    .tabs-list {
      max-height: 200px;
      overflow-y: auto;
    }
    
    .tab-item {
      background: #16213e;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }
    
    .tab-item:last-child {
      margin-bottom: 0;
    }
    
    .tab-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    
    .tab-title {
      font-size: 13px;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }
    
    .tab-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      background: #0f3460;
      color: #00d4ff;
    }
    
    .tab-url {
      font-size: 10px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 8px;
    }
    
    .tab-actions {
      display: flex;
      gap: 8px;
    }
    
    .tab-btn {
      flex: 1;
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .tab-btn.connect {
      background: #00d4ff;
      color: #1a1a2e;
    }
    
    .tab-btn.connect:hover {
      background: #00b8db;
    }
    
    .tab-btn.connect.connected {
      background: #4CAF50;
      color: white;
    }
    
    .tab-btn.disconnect {
      background: #f44336;
      color: white;
    }
    
    .tab-btn.disconnect:hover {
      background: #d32f2f;
    }
    
    .no-tabs {
      text-align: center;
      padding: 20px;
      color: #666;
      font-size: 12px;
    }
    
    .instructions {
      padding: 12px 16px;
      background: #0f3460;
      font-size: 11px;
      color: #888;
      line-height: 1.5;
    }
    
    .instructions strong {
      color: #00d4ff;
    }
    
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }
    
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #0f3460;
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Chrome MCP Controller</h1>
    <div class="subtitle">Control tabs via MCP</div>
  </div>
  
  <div class="server-status">
    <div class="status-indicator stopped" id="statusIndicator"></div>
    <div class="status-text">
      <div id="statusText">Server stopped</div>
      <div style="font-size: 10px; color: #666;" id="portText">Port: 9223</div>
    </div>
    <button class="server-btn start" id="serverBtn">Start</button>
  </div>
  
  <div class="tabs-section">
    <div class="section-title">Open Tabs</div>
    <div class="filter-inputs">
      <input type="text" class="filter-input" id="filterUrl" placeholder="Filter by URL...">
      <input type="text" class="filter-input" id="filterTitle" placeholder="Filter by name...">
    </div>
    <div class="tabs-list" id="tabsList">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
  
  <div class="instructions">
    <strong>How to use:</strong><br>
    1. Start the server above<br>
    2. Navigate to tabs you want to control<br>
    3. Click "Connect" to add tabs to MCP<br>
    4. Use godex to control the tab
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
